<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div id="overlay" class="alert-overlay"></div>
<div id="customAlert" class="custom-alert">
    <p id="alertMsg"></p>
    <button onclick="closeAlert()">OK</button>
</div>

<div class="auth-container">
    <div class="auth-card">
        <h2>Login</h2>

        <form autocomplete="off" method="POST" action="{{ url_for('login') }}">
            <input type="text" name="fakeuser" style="display:none">
            <input type="password" name="fakepass" style="display:none">

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" autocomplete="off" required>
                <i class="fa fa-user icon"></i>
            </div>

            <div class="input-group">
                <input type="password" name="password" id="password" placeholder="Password" autocomplete="new-password" required>
                <i class="fa fa-eye toggle-password" onclick="togglePassword()"></i>
            </div>

            <button type="submit">Login</button>

            <p class="auth-switch">
                Don’t you have an account? 
                <a href="/register">Sign Up</a>
            </p>
        </form>
    </div>
</div>

<!-- JS -->
<script>
function togglePassword() {
    const password = document.getElementById("password");
    password.type = (password.type === "password") ? "text" : "password";
}

function showAlert(message) {
    document.getElementById("alertMsg").innerText = message;

    document.getElementById("customAlert").style.display = "block";
    document.getElementById("overlay").style.display = "block"; // 🔥 block background
}

function closeAlert() {
    document.getElementById("customAlert").style.display = "none";
    document.getElementById("overlay").style.display = "none"; // 🔥 enable again
}
</script>


{% if error %}
<script>
showAlert("❌ Wrong username or password!");
</script>
{% endif %}
</body>
</html>
