<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <h2>Create Account</h2>

        <form method="post">
            {{ csrf_token() }}
            <input type="text" name="username" placeholder="Username" autocomplete="off" required>
            <input type="password" name="password" id="password" placeholder="Password" autocomplete="new-password" required>
            <input type="email" name="email" placeholder="Email" required>

            <button type="submit">Sign Up</button>
        </form>

        <p>
            Already have an account? 
            <a href="{{ url_for('login') }}">Login</a>
        </p>

    </div>
</div>

<!-- Custom Alert -->
<div id="customAlert" class="custom-alert">
    <p id="alertMsg"></p>
    <button onclick="closeAlert()">OK</button>
</div>

<script>
function showAlert(message, redirect=false) {
    document.getElementById("alertMsg").innerText = message;
    document.getElementById("customAlert").style.display = "block";
    window.shouldRedirect = redirect;
}

function closeAlert() {
    document.getElementById("customAlert").style.display = "none";
    if (window.shouldRedirect) {
        window.location.href = "/login";
    }
}
</script>

{% if error %}
<script>
showAlert("❌ {{ error }}", true);
</script>
{% endif %}

{% if success %}
<script>
showAlert("✅ Account created successfully!", true);
</script>
{% endif %}

</body>
</html>
